name: Build and Push Docker Image
on:
  push:
    branches: [ main ]
jobs:
  docker-build-push:
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/music-recommend:latest
      - name: Deploy new container
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/music-recommend:latest
          docker stop music-recommend-container || true
          docker rm music-recommend-container || true
          docker run -d --name music-recommend-container -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/music-recommend:latest